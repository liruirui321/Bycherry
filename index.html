              <a href="/works/research-prompt-kit">科研学习工作台</a>
              <p style="margin: 0.2rem 0 0; color: #73583b;">把论文摘要、图注、实验设计或讨论段落拆成证据、推断、缺失信息和下一步核查。</p>
              <div style="font-size: 0.92rem; margin-top: 0.2rem;">操作内容：粘贴一段摘要或图注，运行本地预览，先得到任务判断、证据候选、风险标记和引用核查。</div>
              <div style="font-size: 0.92rem; margin-top: 0.2rem;">先做这个：先载入读论文练习，运行本地预览，看系统如何把原文材料拆成证据、推断和不能直接下的结论。</div>
              <div style="font-size: 0.92rem; margin-top: 0.2rem;">完成标准：能把一段科研材料整理成可复核的研究记录，并说清哪些结论需要回查原文、图表或实验设计。</div>
              <div style="font-size: 0.92rem; margin-top: 0.2rem;">可保存产出：研究记录 / 引用核查 / 复核报告</div>
              <div style="font-size: 0.92rem; margin-top: 0.2rem;">学习路径：粘贴材料 → 找证据 → 核查结论</div>
            </li>
            <li style="margin-bottom: 0.9rem;">
              <a href="/works/plant-evolution-stories">植物演化时间轴</a>
              <p style="margin: 0.2rem 0 0; color: #73583b;">演化时间轴串联关键创新、证据、自测问题、作答提示和延伸练习。</p>
              <div style="font-size: 0.92rem; margin-top: 0.2rem;">操作内容：选择一个演化阶段，读证据卡，再用自测问题判断这项创新解决了什么生存压力。</div>
              <div style="font-size: 0.92rem; margin-top: 0.2rem;">先做这个：先点种子阶段，比较孢子和种子各自解决了什么传播与保护问题。</div>
              <div style="font-size: 0.92rem; margin-top: 0.2rem;">完成标准：能按时间顺序解释至少三个植物关键创新，并用证据说出它们各自解决的生存压力。</div>
              <div style="font-size: 0.92rem; margin-top: 0.2rem;">可保存产出：学习卡 / 阶段比较 / 证据判读</div>
              <div style="font-size: 0.92rem; margin-top: 0.2rem;">学习路径：选择阶段 → 判读证据 → 完成练习</div>
            </li>
            <li style="margin-bottom: 0.9rem;">
              <a href="/works/concept-explainer">概念解释生成器</a>
              <p style="margin: 0.2rem 0 0; color: #73583b;">输入任意概念或选择常用概念，生成自测问题、类比、机制步骤、可视化流程、迁移练习和即时小测。</p>
              <div style="font-size: 0.92rem; margin-top: 0.2rem;">操作内容：输入一个卡住的概念，先看诊断边界，再生成可复制的学习卡和即时小测。</div>
              <div style="font-size: 0.92rem; margin-top: 0.2rem;">先做这个：先输入光合作用或生态位，按诊断、类比、机制、练习四步检查自己是否真懂。</div>
              <div style="font-size: 0.92rem; margin-top: 0.2rem;">完成标准：能产出一张包含定义、机制、例子、边界和自测题的学习卡，并标出仍需查资料的部分。</div>
              <div style="font-size: 0.92rem; margin-top: 0.2rem;">可保存产出：学习卡 / 可视化流程 / 即时小测</div>
              <div style="font-size: 0.92rem; margin-top: 0.2rem;">学习路径：输入概念 → 看诊断边界 → 生成学习卡</div>
            </li>
            <li style="margin-bottom: 0.9rem;">
              <a href="/works/crispr-interactive">CRISPR 编辑模拟器</a>
              <p style="margin: 0.2rem 0 0; color: #73583b;">操作 guide RNA、Cas 蛋白和修复结果，查看匹配评分、编辑判定、风险核查和模拟报告。</p>
              <div style="font-size: 0.92rem; margin-top: 0.2rem;">操作内容：找出 PAM，修改 guide RNA 碱基，比较匹配评分如何影响切割和修复结果。</div>
              <div style="font-size: 0.92rem; margin-top: 0.2rem;">先做这个：先选高匹配敲除场景，再切到错配比较，看判定为什么从推荐继续变成谨慎使用。</div>
              <div style="font-size: 0.92rem; margin-top: 0.2rem;">完成标准：能根据 PAM、guide 匹配评分和修复结果判断一次编辑是否值得继续，并写出风险理由。</div>
              <div style="font-size: 0.92rem; margin-top: 0.2rem;">可保存产出：guide 判定 / 风险核查 / 模拟报告</div>
              <div style="font-size: 0.92rem; margin-top: 0.2rem;">学习路径：找 PAM → 判 guide → 核查风险</div>
            </li>
          </ul>
          <h2 style="font-size: 1.2rem; margin-top: 1.5rem;">文章</h2>
          <ul>
            <li style="margin-bottom: 0.9rem;">
              <a href="/notes/ai-learning-material-audit">用 AI 做学习材料质检，而不是替你学习</a>
              <p style="margin: 0.2rem 0 0; color: #73583b;">AI 能帮你拆概念、列误解、生成练习和检查清单；真正要训练的是你自己判断证据、边界和理解漏洞的能力……</p>
              <div style="font-size: 0.92rem; margin-top: 0.2rem;">先做这个：先写清楚这次学习最后要会解释什么</div>
              <div style="font-size: 0.92rem; margin-top: 0.2rem;">完成后检查：学习目标能用自己的动作表述</div>
              <div style="font-size: 0.92rem; margin-top: 0.2rem;">可保存产出：学习目标：我需要能够……</div>
            </li>
            <li style="margin-bottom: 0.9rem;">
              <a href="/notes/plant-genome-evidence-chain">从植物基因组读懂一条证据链</a>
              <p style="margin: 0.2rem 0 0; color: #73583b;">读前沿科研的难点不只是降难度，而是找到能进入的问题、证据和解释限制，让基因组材料变成可理解的推理过程……</p>
              <div style="font-size: 0.92rem; margin-top: 0.2rem;">先做这个：先选一个能观察到的植物性状或环境问题</div>
              <div style="font-size: 0.92rem; margin-top: 0.2rem;">完成后检查：入口问题不是纯术语</div>
              <div style="font-size: 0.92rem; margin-top: 0.2rem;">可保存产出：进入问题：为什么……会出现差异？</div>
            </li>
            <li style="margin-bottom: 0.9rem;">
              <a href="/notes/pbl-rubric-evidence">项目制学习中的任务、量规和作品证据</a>
              <p style="margin: 0.2rem 0 0; color: #73583b;">一个项目不是把活动串起来，而是把真实问题、学习目标、任务流程、评价量规和个人作品放在同一条线上……</p>
              <div style="font-size: 0.92rem; margin-top: 0.2rem;">先做这个：先确定最终作品和它要证明的学习目标</div>
              <div style="font-size: 0.92rem; margin-top: 0.2rem;">完成后检查：最终作品能证明学习目标</div>
              <div style="font-size: 0.92rem; margin-top: 0.2rem;">可保存产出：驱动问题：我要解决……</div>
            </li>
            <li style="margin-bottom: 0.9rem;">
              <a href="/notes/ai-comic-video-workflow">我的 AI 漫画与视频创作工作流</a>
              <p style="margin: 0.2rem 0 0; color: #73583b;">从小说文本到分镜、角色资产、TTS、唇形同步和成片组装，真正困难的不是单点生成，而是让每一步可以复用和质检……</p>
              <div style="font-size: 0.92rem; margin-top: 0.2rem;">先做这个：先把脚本拆成场景表和镜头目的</div>
              <div style="font-size: 0.92rem; margin-top: 0.2rem;">完成后检查：角色和场景资产有固定设定</div>
              <div style="font-size: 0.92rem; margin-top: 0.2rem;">可保存产出：场景目标：这一镜头要表现……</div>
            </li>
            <li style="margin-bottom: 0.9rem;">
              <a href="/research/science-to-learning-question">真实科研如何变成你能进入的问题</a>
              <p style="margin: 0.2rem 0 0; color: #73583b;">前沿科研不适合被直接当成结论背诵。更有效的做法，是从已有经验出发，把复杂概念拆成可以观察、比较、推理和表达的小任务……</p>
              <div style="font-size: 0.92rem; margin-top: 0.2rem;">先做这个：先把科研主题改写成一个可观察问题</div>
              <div style="font-size: 0.92rem; margin-top: 0.2rem;">完成后检查：问题能从已有经验进入</div>
              <div style="font-size: 0.92rem; margin-top: 0.2rem;">可保存产出：科研主题：……</div>
            </li>
            <li style="margin-bottom: 0.9rem;">
              <a href="/research/genome-assembly-story">从基因组组装到一个可讲述的科学故事</a>
              <p style="margin: 0.2rem 0 0; color: #73583b;">组装、注释、比较分析和可视化并不是孤立步骤。它们最终需要回答一个问题：这些数据能帮助我们理解植物的什么变化、什么能力和什么历史……</p>
              <div style="font-size: 0.92rem; margin-top: 0.2rem;">先做这个：先写出研究对象为什么值得讲</div>
              <div style="font-size: 0.92rem; margin-top: 0.2rem;">完成后检查：研究对象的独特性说清楚了</div>
              <div style="font-size: 0.92rem; margin-top: 0.2rem;">可保存产出：研究对象：它特别在……</div>
            </li>
            <li style="margin-bottom: 0.9rem;">
              <a href="/research/barcoding-evidence-chain">Barcoding 项目里的证据链设计</a>
              <p style="margin: 0.2rem 0 0; color: #73583b;">一个好的物种鉴定项目，不只是把实验做完。更重要的是让样本、记录、序列、比对结果和系统发育树共同构成一条可解释的证据链。</p>
              <div style="font-size: 0.92rem; margin-top: 0.2rem;">先做这个：先建立样本照片、地点和编号记录</div>
              <div style="font-size: 0.92rem; margin-top: 0.2rem;">完成后检查：样本记录可回溯</div>
              <div style="font-size: 0.92rem; margin-top: 0.2rem;">可保存产出：样本记录：编号、照片、地点、采集人</div>
            </li>
