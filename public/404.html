<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#F5F1EA" />
    <meta name="color-scheme" content="light" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>By Cherry | 正在返回</title>
    <style>
      :root {
        color-scheme: light;
        --cream: #F5F1EA;
        --card: #FAF7F1;
        --forest: #3A5C3E;
        --sage: #A9C9AC;
        --peach: #E8907C;
        --yellow: #DDB95A;
        --brown: #3E2A1A;
        --mid: #7A5C44;
        --border: rgba(94, 68, 42, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        background: var(--cream);
        color: var(--mid);
        font-family: ui-rounded, "Nunito", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.65;
      }

      main {
        width: min(100%, 520px);
        position: relative;
        text-align: center;
        background: var(--card);
        border: 1.5px solid var(--border);
        border-radius: 8px;
        padding: 2rem 1.5rem;
        box-shadow: 5px 8px 0 rgba(94, 68, 42, 0.08);
        overflow: hidden;
      }

      h1 {
        margin: 0 0 0.55rem;
        color: var(--brown);
        font-size: clamp(1.7rem, 6vw, 2.35rem);
        line-height: 1.15;
      }

      p {
        margin: 0 auto 1rem;
        max-width: 390px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-top: 0.25rem;
        border-radius: 8px;
        padding: 0.62rem 1.05rem;
        background: var(--forest);
        color: #FAF7F1;
        font-weight: 900;
        text-decoration: none;
        box-shadow: 3px 5px 0 rgba(58, 92, 62, 0.2);
      }

      a:focus-visible {
        outline: 3px solid var(--peach);
        outline-offset: 4px;
      }

      svg {
        display: block;
        width: min(100%, 220px);
        height: auto;
        margin: 0 auto 0.9rem;
      }
    </style>
    <script>
      try {
        sessionStorage.setItem(
          "bycherry-redirect-path",
          window.location.pathname + window.location.search + window.location.hash
        );
      } catch (error) {
        // Continue to the homepage if browser storage is unavailable.
      }
      window.location.replace("/");
    </script>
  </head>
  <body>
    <main>
      <svg viewBox="0 0 210 118" fill="none" aria-hidden="true" focusable="false">
        <rect x="28" y="22" width="154" height="78" rx="10" fill="#FFF8EA" stroke="var(--forest)" stroke-width="2.5" />
        <path d="M47 78 H163" stroke="rgba(94,68,42,0.18)" stroke-width="6" stroke-linecap="round" />
        <path d="M58 48 H118" stroke="var(--forest)" stroke-width="5" stroke-linecap="round" />
        <path d="M58 64 H148" stroke="var(--sage)" stroke-width="5" stroke-linecap="round" />
        <path d="M143 38 L163 58 L143 78" stroke="var(--peach)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
        <circle cx="47" cy="48" r="5" fill="var(--yellow)" />
        <circle cx="47" cy="64" r="5" fill="#7AAFC8" />
      </svg>
      <h1>正在返回 By Cherry</h1>
      <p>正在把这个地址交回主页应用处理，稍后会恢复你刚才打开的内容。</p>
      <a href="/">如果没有自动跳转，请返回内容目录</a>
    </main>
  </body>
</html>
